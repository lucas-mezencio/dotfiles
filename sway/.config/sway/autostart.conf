# Autostart — services launched when sway starts

# Notification daemon
exec mako

# Status bar
exec waybar

# Wallpaper (set a solid dark color by default; replace path with an actual image)
exec swaybg -c "#1e1e2e"
# exec swaybg -i ~/.config/omarchy/current/background -m fill

# Idle management + screen lock
# - 150s  → lock screen
# - 330s  → display off
# - on resume → display on
# - before sleep → lock
exec swayidle -w \
    timeout 150 'swaylock -f' \
    timeout 330 'swaymsg "output * dpms off"' \
    resume      'swaymsg "output * dpms on"'  \
    before-sleep 'swaylock -f'

# Night light — disabled by default (like omarchy's hyprsunset identity profile).
# Uncomment to auto-enable warm color on login, or use Super+Ctrl+N to toggle.
# exec wlsunset -t 4000 -T 6500

# Walker app launcher background service
exec walker --gapplication-service

# Polkit agent (needed for GUI privilege prompts)
exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# XDG autostart (handles apps that register themselves with systemd/xdg)
exec dex --autostart --environment sway
