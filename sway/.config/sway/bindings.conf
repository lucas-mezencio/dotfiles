# Keybindings
# Mirrors hypr/bindings.conf workflow, translated to sway syntax.

set $mod Mod4

# ── Application launchers ────────────────────────────────────────────────────

# Terminal
bindsym $mod+Return       exec ghostty
bindsym $mod+Alt+Return   exec ghostty -e tmux new

# App launcher (walker)
bindsym $mod+slash        exec ~/.local/bin/sway-launcher

# Browser (xdg default)
bindsym $mod+Shift+b      exec xdg-open https://

# File manager
bindsym $mod+Shift+f      exec nautilus --new-window

# Music
bindsym $mod+Shift+m      exec spotify

# Editor (Neovim in terminal)
bindsym $mod+Shift+n      exec ghostty -e nvim

# Docker TUI
bindsym $mod+Shift+d      exec ghostty -e lazydocker

# Password manager
bindsym $mod+Shift+slash  exec 1password

# ── Lock / session ────────────────────────────────────────────────────────────

bindsym $mod+n            exec ~/.local/bin/sway-lock
bindsym $mod+Alt+Ctrl+l   exec ~/.local/bin/sway-lock

# ── Window management ────────────────────────────────────────────────────────

bindsym $mod+c            kill

# Focus (vi-style)
bindsym $mod+h            focus left
bindsym $mod+j            focus down
bindsym $mod+k            focus up
bindsym $mod+l            focus right

# Move window (vi-style)
bindsym $mod+Ctrl+h       move left
bindsym $mod+Ctrl+j       move down
bindsym $mod+Ctrl+k       move up
bindsym $mod+Ctrl+l       move right

# Resize window (inline, repeatable)
bindsym $mod+Alt+h        resize shrink width  10px
bindsym $mod+Alt+l        resize grow   width  10px
bindsym $mod+Alt+k        resize shrink height 10px
bindsym $mod+Alt+j        resize grow   height 10px

# Toggle split direction
bindsym $mod+Ctrl+t       layout toggle split

# Toggle floating
bindsym $mod+Shift+space  floating toggle

# Toggle fullscreen
bindsym $mod+f            fullscreen toggle

# Mouse drag (floating windows)
floating_modifier $mod normal

# ── Workspace navigation ─────────────────────────────────────────────────────

# Stay on the current output (mirrors Hyprland r+1 / e-1 behaviour)
bindsym $mod+period       workspace next_on_output
bindsym $mod+comma        workspace prev_on_output

# Move window to adjacent workspace on the same output
bindsym $mod+Ctrl+period  move container to workspace next_on_output
bindsym $mod+Ctrl+comma   move container to workspace prev_on_output

# Direct workspace access (1–10)
bindsym $mod+1            workspace number 1
bindsym $mod+2            workspace number 2
bindsym $mod+3            workspace number 3
bindsym $mod+4            workspace number 4
bindsym $mod+5            workspace number 5
bindsym $mod+6            workspace number 6
bindsym $mod+7            workspace number 7
bindsym $mod+8            workspace number 8
bindsym $mod+9            workspace number 9
bindsym $mod+0            workspace number 10

bindsym $mod+Shift+1      move container to workspace number 1
bindsym $mod+Shift+2      move container to workspace number 2
bindsym $mod+Shift+3      move container to workspace number 3
bindsym $mod+Shift+4      move container to workspace number 4
bindsym $mod+Shift+5      move container to workspace number 5
bindsym $mod+Shift+6      move container to workspace number 6
bindsym $mod+Shift+7      move container to workspace number 7
bindsym $mod+Shift+8      move container to workspace number 8
bindsym $mod+Shift+9      move container to workspace number 9
bindsym $mod+Shift+0      move container to workspace number 10

# ── Scratchpad (≈ Hyprland special workspace) ─────────────────────────────────

bindsym $mod+Shift+s      move scratchpad
bindsym $mod+s            scratchpad show

# ── Notifications (mako) ─────────────────────────────────────────────────────

bindsym $mod+semicolon            exec makoctl dismiss
bindsym $mod+Shift+semicolon      exec makoctl dismiss --all
bindsym $mod+Ctrl+semicolon       exec makoctl mode -t do-not-disturb
bindsym $mod+Alt+semicolon        exec makoctl invoke

# ── Media keys (wpctl = pipewire/wireplumber, same as omarchy) ───────────────

bindsym XF86AudioRaiseVolume  exec wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindsym XF86AudioLowerVolume  exec wpctl set-volume        @DEFAULT_AUDIO_SINK@ 5%-
bindsym XF86AudioMute         exec wpctl set-mute          @DEFAULT_AUDIO_SINK@ toggle
bindsym XF86AudioMicMute      exec wpctl set-mute          @DEFAULT_AUDIO_SOURCE@ toggle

# Precise 1% adjustments (with Alt, mirrors omarchy)
bindsym Alt+XF86AudioRaiseVolume  exec wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 1%+
bindsym Alt+XF86AudioLowerVolume  exec wpctl set-volume        @DEFAULT_AUDIO_SINK@ 1%-

bindsym XF86MonBrightnessUp   exec brightnessctl set +5%
bindsym XF86MonBrightnessDown exec brightnessctl set 5%-
bindsym Alt+XF86MonBrightnessUp   exec brightnessctl set +1%
bindsym Alt+XF86MonBrightnessDown exec brightnessctl set 1%-

bindsym XF86AudioPlay  exec playerctl play-pause
bindsym XF86AudioNext  exec playerctl next
bindsym XF86AudioPrev  exec playerctl previous

# ── Night light (wlsunset) — mirrors omarchy hyprsunset toggle ────────────────
# Toggle warm/off; temperature matches omarchy's default (4000K warm, 6500K day)
bindsym $mod+Ctrl+n exec \
    if pgrep -x wlsunset > /dev/null; then \
        pkill wlsunset && notify-send "Night light off"; \
    else \
        wlsunset -t 4000 -T 6500 & notify-send "Night light on"; \
    fi

# ── Screenshot ────────────────────────────────────────────────────────────────

# Region select → clipboard (Print alone)
bindsym Print       exec grim -g "$(slurp)" - | wl-copy
# Full screen → clipboard
bindsym Alt+Print   exec grim - | wl-copy
# Region select → save to ~/Pictures
bindsym Shift+Print exec grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# ── Sway reload / exit ───────────────────────────────────────────────────────

bindsym $mod+Shift+r      reload
bindsym $mod+Shift+e      exec swaynag -t warning \
    -m 'Exit sway?' \
    -b 'Yes' 'swaymsg exit'
