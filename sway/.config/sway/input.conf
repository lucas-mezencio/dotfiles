# Input configuration
# Check device identifiers: swaymsg -t get_inputs

input type:keyboard {
    xkb_layout  br
    xkb_model   abnt2
    # Caps Lock → Ctrl when held; Caps Lock when tapped with Shift
    xkb_options caps:ctrl_modifier

    repeat_rate  40
    repeat_delay 600
}

input type:touchpad {
    scroll_factor 0.4
    natural_scroll disabled
    tap enabled
    # Two-finger right-click
    click_method clickfinger
    # Keep touchpad active while typing
    dwt disabled
}

# Per-app touchpad scroll speed (via sway input identifier, set after app launch)
# Ghostty terminal — slower touchpad scroll
# Note: per-window scroll_factor is not natively supported in sway;
# use the global scroll_factor above as a compromise.
