# Monitor / output configuration
# Check connected outputs: swaymsg -t get_outputs
#
# Primary:   External Samsung T22B300  — HDMI-A-1 — 1920x1080
# Secondary: Internal laptop display   — eDP-1    — 1024x720

output HDMI-A-1 {
    resolution 1920x1080
    position 0 0
    scale 1
}

output eDP-1 {
    resolution 1024x720
    position 1920 0
    scale 1
}

# Workspaces 1–9 live on the primary (external) monitor.
# Workspace 10 is the dedicated secondary (laptop screen) workspace.
workspace 1  output HDMI-A-1
workspace 2  output HDMI-A-1
workspace 3  output HDMI-A-1
workspace 4  output HDMI-A-1
workspace 5  output HDMI-A-1
workspace 6  output HDMI-A-1
workspace 7  output HDMI-A-1
workspace 8  output HDMI-A-1
workspace 9  output HDMI-A-1
workspace 10 output eDP-1
